<!DOCTYPE html>
<html>
<head>
    <title>Media & Democracy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Scr 1 -->
    <div class="screen">
        <h1>Ideal Role of Media</h1>
        <button>Watchdog</button>
        <button>Informer</button>
        <button>Public Forum</button>
        <p>Media helps citizens stay informed.</p>
        <button>Next</button>
    </div>
    <!-- Scr2 -->
    <div class="screen">
        <h1>How to Spot Fake News</h1>
        <ul>
            <li>Check the Source</li>
            <li>Verify Information</li>
            <li>Identify Bias</li>
        </ul>
        <button>Back</button>
        <button>Next</button>
    </div>
    <!-- Scr3 -->
    <div class="screen">
        <h1>Reality Check Challenge</h1>
        <p>"Breaking News: Aliens have landed!"</p>
        <input type="radio" name="news"> Fact Check <br>
        <input type="radio" name="news"> Share Immediately <br>
        <input type="radio" name="news"> Ignore <br><br>
        <button>Submit</button>
    </div>
    <!-- Scr4 -->
    <div class="screen">
        <h1>Result</h1>
        <p>Your choices affect how information spreads.</p>
        <button>Try Again</button>
    </div>
</body>
</html>
